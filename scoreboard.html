<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TARA | Scoreboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<main class="container py-5 tara-shell">
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
    <div>
      <p class="section-kicker mb-1">Progress Summary</p>
      <h1 class="h2 fw-bold mb-0">Scoreboard</h1>
    </div>
    <a class="btn btn-outline-primary" href="dashboard.html"><i class="fa-solid fa-grid-2 me-2"></i>Back to Dashboard</a>
  </div>

  <section class="tara-card p-4 p-md-5">
    <p class="tara-subtitle mb-4">Quiz scores are stored in this browser only. Use the dashboard to return to any level.</p>
    <div class="table-responsive">
      <table class="table align-middle mb-0">
        <thead>
          <tr>
            <th>Level</th>
            <th>Score</th>
            <th>Status</th>
            <th>Last Attempt</th>
          </tr>
        </thead>
        <tbody id="scoreboardBody"></tbody>
      </table>
    </div>
  </section>
</main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/scoreboard.js"></script>
</body>
</html>
