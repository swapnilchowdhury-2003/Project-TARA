  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Hind Siliguri', 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }
    .tara-header {
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
      color: white;
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      border-bottom: 1px solid rgba(255,140,0,0.3);
    }
    .tara-header .btn { padding: 8px 18px; font-size: 0.9rem; font-weight: 600; border-radius: 50px; }
    .tara-header h2 { font-weight: 800; font-size: 1.3rem; margin-bottom: 5px; }
    .topic-container { max-width: 1000px; margin: 0 auto; padding: 1.5rem 1rem; }
    
    /* Level Badges */
    .level-badge {
      display: inline-block;
      background: rgba(255,140,0,0.2);
      border-radius: 50px;
      padding: 0.2rem 0.8rem;
      font-size: 0.7rem;
      margin-bottom: 0.5rem;
      color: #ffaa44;
    }
    .level-badge.level1 { background: #ff6b6b20; color: #ff6b6b; }
    .level-badge.level2 { background: #4ecdc420; color: #4ecdc4; }
    .level-badge.level3 { background: #45b7d120; color: #45b7d1; }
    .level-badge.level4 { background: #96ceb420; color: #96ceb4; }
    .level-badge.level5 { background: #f9ca2420; color: #f9ca24; }
    .level-badge.level6 { background: #e056fd20; color: #e056fd; }
    
    .quiz-card {
      background: rgba(30, 30, 50, 0.95);
      border-radius: 25px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255,140,0,0.3);
    }
    .quiz-title { font-size: 1.3rem; font-weight: 700; color: #ff8c00; margin-bottom: 1rem; text-align: center; }
    .question-card {
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      padding: 1.2rem;
      margin-bottom: 1rem;
    }
    .question-text { font-size: 1rem; font-weight: 600; margin-bottom: 0.8rem; line-height: 1.5; }
    .story-box {
      background: rgba(255,140,0,0.1);
      border-radius: 12px;
      padding: 0.6rem 1rem;
      margin-bottom: 0.8rem;
      font-size: 0.9rem;
      color: #ffcc88;
      border-left: 3px solid #ff8c00;
    }
    /* Matrix Visual */
    .matrix-visual {
      display: inline-block;
      background: rgba(0,0,0,0.4);
      border-radius: 15px;
      padding: 0.8rem;
      margin: 0.5rem 0;
      font-family: monospace;
    }
    .matrix-row {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin: 0.2rem 0;
    }
    .matrix-cell {
      background: rgba(255,140,0,0.2);
      border: 1px solid #ff8c00;
      border-radius: 8px;
      padding: 0.3rem 0.6rem;
      min-width: 40px;
      text-align: center;
      font-weight: bold;
    }
    .options { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-top: 0.8rem; }
    .option-btn {
      background: rgba(255,255,255,0.1);
      border: 2px solid #ff8c00;
      border-radius: 50px;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }
    .option-btn:hover { transform: scale(1.02); background: rgba(255,140,0,0.2); }
    .option-btn.selected-correct { background: #28a745; border-color: #90ee90; }
    .options.locked .option-btn { opacity: 0.55; cursor: not-allowed; pointer-events: none; }
    .quiz-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,140,0,0.3);
    }
    .submit-btn {
      background: linear-gradient(135deg, #28a745, #218838);
      border: none;
      padding: 0.7rem 1.8rem;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 60px;
      color: white;
      cursor: pointer;
    }
    .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }
    .score-area { font-size: 1.05rem; font-weight: bold; }
    .timer-area { font-size: 1.3rem; font-weight: bold; color: #ffaa44; }
    .tara-footer { background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%); color: white; margin-top: 2rem; padding: 1rem 0; text-align: center; border-top: 1px solid rgba(255,140,0,0.3); }
    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }

    /* ===== Level progress strip (new) ===== */
    .level-progress-strip {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }
    .level-dot {
      min-width: 64px;
      border-radius: 14px;
      padding: 0.4rem 0.5rem;
      text-align: center;
      font-size: 0.7rem;
      opacity: 0.45;
      border: 2px solid transparent;
      background: rgba(255,255,255,0.05);
    }
    .level-dot .level-dot-num { display: block; font-weight: 700; margin-bottom: 0.1rem; }
    .level-dot .level-dot-val { display: block; font-weight: 800; font-size: 0.8rem; }
    .level-dot.active { opacity: 1; border-color: #ff8c00; background: rgba(255,140,0,0.15); }
    .level-dot.done { opacity: 1; border-color: #28a745; background: rgba(40,167,69,0.15); }

    @media (max-width: 768px) { .option-btn { padding: 0.4rem 0.8rem; font-size: 0.8rem; } .story-box { font-size: 0.8rem; } .matrix-cell { min-width: 30px; padding: 0.2rem 0.4rem; font-size: 0.8rem; } .level-dot { min-width: 48px; font-size: 0.62rem; } }
  </style>
</head>

<header class="tara-header py-2">
  <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">

    <div class="text-center"><h2 class="mb-0"><i class="fa-solid fa-pen-clip me-2"></i>প্রিটেস্ট</h2><small>Level 1-6 · ৩০টি প্রশ্ন</small></div>

<div class="topic-container">
  <div class="quiz-card">
    <div class="quiz-title">📋 প্রিটেস্ট — লেভেল অনুযায়ী (প্রতি লেভেলে ৫টি প্রশ্ন, মোট ৩০টি)</div>

</div>

<footer class="tara-footer"><div class="container"><p class="mb-0"><i class="fa-regular fa-circle-check me-2"></i>প্রতিটি লেভেলের সব প্রশ্নের উত্তর দিয়ে জমা দিন — প্রতি লেভেলের ফলাফল সাথে সাথেই সংরক্ষণ হয়</p></div></footer>

<script>

  // Each level is graded & SAVED TO FIREBASE the moment it's submitted.
  // e.g. only Level 1 done -> Firestore gets pretestScore=3, pretestMaxScore=5

  // If the user leaves mid-test and comes back, they resume from the next
  // un-finished level instead of starting over.
  // ==========================================
  
  const firebaseConfig = {
    apiKey: "AIzaSyBoWaXDIBdX7OyJMsqIJ4paMIDe63QvEfc",
    authDomain: "tara-research.firebaseapp.com",
    projectId: "tara-research",
    storageBucket: "tara-research.firebasestorage.app",
    messagingSenderId: "761125280686",
    appId: "1:761125280686:web:fd0ed50e950259c8fac63f",
    measurementId: "G-KRN5SNJ2YR"
  };
  
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();
  
  let currentUser = null;
  let timerInterval = null;
  let timeSeconds = 1200;
  let quizSubmitted = false;     // true once the WHOLE pretest (all 6 levels) is finished

  // ---- Level-by-level state ----
  let currentLevelIdx = 0;       // 0..5  (Level 1..6) — the level currently being attempted
  let userAnswers = {};          // answers for the CURRENT level only, key = local question index (0-4)
  let levelLocked = false;       // true once current level has been submitted/graded
  let levelScores = [null, null, null, null, null, null]; // score per level (out of 5) once graded
  let cumulativeTotal = 0;       // running total score across graded levels (out of 30 max)
  
  // Matrix data for level 6
  const matrixData = [[5,8,2],[7,3,9],[4,1,6]];
  function getMatrixVisualHTML() {
    let html = '<div class="matrix-visual"><div class="matrix-row"><div class="matrix-cell"></div><div class="matrix-cell">কলাম 0</div><div class="matrix-cell">কলাম 1</div><div class="matrix-cell">কলাম 2</div></div>';
    for (let i = 0; i < 3; i++) {
      html += `<div class="matrix-row"><div class="matrix-cell">সারি ${i}</div>`;
      for (let j = 0; j < 3; j++) {
        html += `<div class="matrix-cell">${matrixData[i][j]}</div>`;
      }
      html += '</div>';
    }
    html += '</div>';
    return html;
  }
  
  // ==========================================
  // LEVEL 1 (5 questions)
  // ==========================================
  const level1Questions = [
    { level: 1, story: "অবনি শুধু গোটা ফল খায়।", text: "নিচের কোনটি অবনি খাবে?", options: ["🍎 একটি গোটা আপেল", "🍎½ একটি অর্ধেক আপেল", "🍊½ একটি অর্ধেক কমলা", "🥭½ একটি অর্ধেক আম"], correct: 0 },
    { level: 1, story: "প্রমিত পুরো ফল খেয়ে শেষ করতে পারে না।", text: "নিচের কোনটি প্রমিত খাবে?", options: ["🍎½ একটি অর্ধেক আপেল", "🍎 একটি গোটা আপেল", "🍊 একটি গোটা কমলা", "🥭 একটি গোটা আম"], correct: 0 },
    { level: 1, story: "🍎🍎🍎🍎🍎 (৫টি আপেল)", text: "বিবৃতি: 'এখানে ৪টি আপেল আছে' - সত্য না মিথ্যা?", options: ["✅ সত্য", "❌ মিথ্যা"], correct: 1 },
    { level: 1, story: "একটি স্কুল ব্যাগের নাম 'SchoolBag'। সকালে 📚 বই, বিকালে ✏️ কলম, রাতে 📓 খাতা।", text: "ব্যাগটিকে প্রোগ্রামিংয়ে কী বলব?", options: ["ভেরিয়েবল", "কনস্ট্যান্ট", "লুপ", "ফাংশন"], correct: 0 },
    { level: 1, text: "নিচের কোনটি Integer (পূর্ণসংখ্যা) ডাটা টাইপের উদাহরণ?", options: ["৩.৫", '"বাংলা"', "১০০", "সত্য"], correct: 2 }
  ];
  
  // ==========================================
  // LEVEL 2 (5 questions)
  // ==========================================
  const level2Questions = [
    { level: 2, story: "তোমার কাছে ২টি আপেল আছে। বন্ধু আরও ২টি আপেল দিল।", text: "মোট কতটি আপেল হলো? (২ + ২ = ?)", options: ["৩টি", "৪টি", "৫টি", "৬টি"], correct: 1 },
    { level: 2, story: "গরু ঘাস খায় (ইনপুট) এবং দুধ দেয় (আউটপুট)।", text: "এখানে ইনপুট কী?", options: ["দুধ", "গরু", "ঘাস", "খামার"], correct: 2 },
    { level: 2, story: "একটি দোকানে ৫টি আম আছে। আরও ৩টি আসলে মোট কত হবে?", text: "এক্সপ্রেশন কী?", options: ["৫ - ৩ = ২", "৫ + ৩ = ৮", "৫ × ৩ = ১৫", "৫ ÷ ৩ = ১.৬৬"], correct: 1 },
    { level: 2, story: "রিতা প্রতিদিন ২টি চকলেট খায়। সোম, মঙ্গল, বুধবার খেল।", text: "মোট কত খেল? (কাউন্টার)", options: ["৪টি", "৫টি", "৬টি", "৮টি"], correct: 2 },

  ];
  
  // ==========================================
  // LEVEL 3 (5 questions)
  // ==========================================
  const level3Questions = [
    { level: 3, story: "বৃষ্টি হলে ছাতা নিবো। এখন বৃষ্টি হচ্ছে।", text: "আমি কী করব?", options: ["ছাতা নিবো না", "ছাতা নিবো", "ঘর থেকে বের হবো না", "খেলতে যাবো"], correct: 1 },
    { level: 3, story: "আমার কাছে ১০ টাকার বেশি থাকলে চিপস কিনবো, না হলে ক্যান্ডি। আমার কাছে ৮ টাকা আছে।", text: "আমি কী কিনবো?", options: ["চিপস", "ক্যান্ডি", "আইসক্রিম", "কিছুই না"], correct: 1 },
    { level: 3, story: "🔴🟡🔴🟡🔴", text: "পরবর্তী রং কোনটি?", options: ["🔴 লাল", "🟡 হলুদ", "🔵 নীল", "🟢 সবুজ"], correct: 1 },
    { level: 3, story: "একবার মাঠ ঘুরলে ১০ টাকা। ১০ বার ঘুরলে কত টাকা পাবে? (Loop)", text: "মোট কত টাকা পাবে?", options: ["৫০ টাকা", "৮০ টাকা", "১০০ টাকা", "১২০ টাকা"], correct: 2 },
    { level: 3, story: "ক্লাস ৩ থেকে ৫ পর্যন্ত প্রতিযোগিতা।", text: "কোন ক্লাসগুলো অংশ নিতে পারবে?", options: ["১,২,৩", "২,৩,৪", "৩,৪,৫", "৪,৫,৬"], correct: 2 }

  // ==========================================

  const level4Questions = [
    { level: 4, story: "TotalFruits বাক্সে প্রথমে ৩টি আম, তারপর ২টি কাঁঠাল, তারপর ৪টি আপেল রাখলে", text: "মোট কত ফল? (Accumulator)", options: ["৭টি", "৮টি", "৯টি", "১০টি"], correct: 2 },

    { level: 4, text: "নিচের কোনটি মৌলিক সংখ্যা?", options: ["৪", "৬", "৭", "৯"], correct: 2 }
  ];
  
  // ==========================================

  // ==========================================
  const level5Questions = [
    { level: 5, story: "১-১০ পর্যন্ত জোড় সংখ্যা বাদ দিতে বলা হলো (Continue)।", text: "কোন সংখ্যা বলবে?", options: ["১,৩,৫,৭,৯", "২,৪,৬,৮,১০", "১,২,৩,৪,৫", "৫,৬,৭,৮,৯,১০"], correct: 0 },

    { level: 5, story: "৫! = ১×২×৩×৪×৫", text: "ফ্যাক্টরিয়ালের মান কত?", options: ["৬০", "১০০", "১২০", "১৫০"], correct: 2 },
    { level: 5, story: "Fibonacci: ১,১,২,৩,৫,___", text: "পরবর্তী সংখ্যা কত?", options: ["৬", "৭", "৮", "৯"], correct: 2 },
    { level: 5, story: "অ্যারে ['🍎','🍌','🍊','🍇','🥭']", text: "ইনডেক্স ২-এ কী আছে?", options: ["🍎 আপেল", "🍊 কমলা", "🍇 আঙ্গুর", "🥭 আম"], correct: 1 }
  ];
  
  // ==========================================
  // LEVEL 6 (5 questions)
  // ==========================================
  const level6Questions = [
    { level: 6, story: "নিচের ম্যাট্রিক্সটি দেখো:", text: "সারি ১, কলাম ২ - অর্থাৎ [১][২] - তে কোন সংখ্যা আছে?", matrix: true, correct: 9, getMatrixHTML: getMatrixVisualHTML, options: ["৭", "৩", "৯", "৬"] },
    { level: 6, story: "রান্নার রেসিপি (ডিম, চিনি, মেশানো, ওভেন)", text: "প্রোগ্রামিংয়ে এটাকে কী বলে?", options: ["ভেরিয়েবল", "লুপ", "ফাংশন", "অ্যারে"], correct: 2 },
    { level: 6, story: '"২ কাপ চা বানাও"', text: 'এখানে "২ কাপ" কী?', options: ["ফাংশন", "রিটার্ন ভ্যালু", "প্যারামিটার", "লুপ"], correct: 2 },
    { level: 6, story: "যোগ মেশিনে ৫+৩=৮", text: "এখানে ৮ কী?", options: ["প্যারামিটার", "রিটার্ন ভ্যালু", "ফাংশন", "লুপ"], correct: 1 },
    { level: 6, story: "Multiply(৪,৫) → ২০", text: "এখানে ৪ ও ৫ কী এবং ২০ কী?", options: ["৪,৫=Return, ২০=Parameter", "৪,৫=Parameter, ২০=Return", "৪,৫=Function, ২০=Loop", "৪,৫=Loop, ২০=Function"], correct: 1 }
  ];

  // All 6 levels in order — index 0..5 = Level 1..6
  const levelQuestionsArr = [
    level1Questions, level2Questions, level3Questions,
    level4Questions, level5Questions, level6Questions
  ];
  
  function getLevelBadgeClass(level) {
    const classes = { 1: 'level1', 2: 'level2', 3: 'level3', 4: 'level4', 5: 'level5', 6: 'level6' };
    return classes[level] || 'level1';
  }

  // ---------- Level progress strip (top) ----------
  function renderLevelProgress() {
    const strip = document.getElementById('levelProgressStrip');
    let html = '';
    for (let i = 0; i < 6; i++) {
      const lvlNum = i + 1;
      let stateClass = '';
      let valueText = `${lvlNum}`;
      if (i < currentLevelIdx || (i === currentLevelIdx && levelLocked)) {
        stateClass = 'done';
        valueText = `${levelScores[i]}/5 ✅`;
      } else if (i === currentLevelIdx) {
        stateClass = 'active';
        valueText = 'চলছে';
      }
      html += `<div class="level-dot ${stateClass} ${getLevelBadgeClass(lvlNum)}">
                  <span class="level-dot-num">লেভেল ${lvlNum}</span>
                  <span class="level-dot-val">${valueText}</span>
               </div>`;
    }
    strip.innerHTML = html;
  }

  // ---------- Footer score text ----------
  function updateFooter() {
    const scoreSpan = document.getElementById('scoreDisplay');
    if (levelLocked) {
      const doneQuestions = (currentLevelIdx + 1) * 5;
      scoreSpan.innerHTML = `লেভেল ${currentLevelIdx + 1} স্কোর: ${levelScores[currentLevelIdx]}/5 &nbsp;|&nbsp; সর্বমোট: <strong>${cumulativeTotal}/${doneQuestions}</strong>`;
    } else {
      const answered = Object.keys(userAnswers).length;
      scoreSpan.innerText = `উত্তর দিয়েছেন: ${answered}/5 (এই লেভেলে)`;
    }
  }

  // ---------- Action button (submit level / next level / finish) ----------
  function setActionButton(state) {
    const btn = document.getElementById('actionBtn');
    btn.disabled = false;
    if (state === 'submit') {
      btn.innerHTML = '<i class="fa-solid fa-check-circle me-2"></i>এই লেভেল জমা দাও';
      btn.onclick = submitCurrentLevel;
    } else if (state === 'next') {
      if (currentLevelIdx === 5) {
        btn.innerHTML = '<i class="fa-solid fa-flag-checkered me-2"></i>ফলাফল দেখুন';
        btn.onclick = finishPretest;
      } else {
        btn.innerHTML = '<i class="fa-solid fa-arrow-right me-2"></i>পরবর্তী লেভেল';
        btn.onclick = goToNextLevel;
      }
    }
  }

  // ---------- Render the 5 questions of the current level ----------
  function renderLevel(levelIdx) {
    levelLocked = false;
    userAnswers = {};

    const questions = levelQuestionsArr[levelIdx];
    const container = document.getElementById('questionsContainer');
    container.innerHTML = '';

    document.getElementById('currentLevelHeader').innerHTML =
      `<div class="level-badge ${getLevelBadgeClass(levelIdx + 1)}">📚 লেভেল ${levelIdx + 1} — ৫টি প্রশ্ন</div>`;

    questions.forEach((q, idx) => {
      const qDiv = document.createElement('div');
      qDiv.className = 'question-card';
      qDiv.id = `q-${levelIdx}-${idx}`;

      let storyHtml = q.story ? `<div class="story-box"><i class="fa-solid fa-comment-dots me-1"></i> ${q.story}</div>` : '';
      let matrixHtml = '';
      if (q.matrix && q.getMatrixHTML) {
        matrixHtml = q.getMatrixHTML();
      }

      qDiv.innerHTML = `
        ${storyHtml}
        ${matrixHtml}
        <div class="question-text">📝 প্রশ্ন ${idx + 1}: ${q.text}</div>
        <div class="options" id="options-${idx}"></div>
      `;
      container.appendChild(qDiv);

      const optsDiv = document.getElementById(`options-${idx}`);
      q.options.forEach((opt, optIdx) => {
        const optBtn = document.createElement('div');
        optBtn.className = 'option-btn';
        optBtn.textContent = opt;
        optBtn.onclick = () => selectAnswer(idx, optIdx, optBtn);
        optsDiv.appendChild(optBtn);
      });
    });

    renderLevelProgress();
    updateFooter();
    setActionButton('submit');
  }

  function selectAnswer(qIdx, optIdx, btnElement) {
    if (levelLocked || quizSubmitted) return;
    const optsDiv = document.getElementById(`options-${qIdx}`);
    const btns = optsDiv.querySelectorAll('.option-btn');
    btns.forEach(btn => btn.classList.remove('selected-correct'));
    btnElement.classList.add('selected-correct');
    userAnswers[qIdx] = optIdx;
    updateFooter();
  }

  function lockCurrentLevelOptions() {
    document.querySelectorAll('#questionsContainer .options').forEach(div => div.classList.add('locked'));
  }

  // ---------- Save progress to Firebase (called after EVERY level submit) ----------
  // Writes: pretestScore (cumulative correct so far), pretestMaxScore (questions
  // attempted so far, i.e. 5/10/15/20/25/30), pretestLevelsCompleted (0-6),
  // and pretestL{n} (that level's own score out of 5, used to resume later).
  async function saveProgress() {
    if (!currentUser) return;
    const levelsCompleted = currentLevelIdx + 1;
    const maxScore = levelsCompleted * 5;
    const updateObj = {
      pretestScore: cumulativeTotal,
      pretestMaxScore: maxScore,
      pretestLevelsCompleted: levelsCompleted,
      lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
    };
    updateObj[`pretestL${currentLevelIdx + 1}`] = levelScores[currentLevelIdx];
    try {
      await db.collection('all_results').doc(currentUser).set(updateObj, { merge: true });
      console.log(`Pretest progress saved: ${cumulativeTotal}/${maxScore} (level ${levelsCompleted}/6 done)`);
    } catch (e) {
      console.error("Firebase save error:", e);
    }
  }

  // ---------- Submit the current level (grades it, locks it, saves it) ----------
  async function submitCurrentLevel() {
    if (levelLocked || quizSubmitted) return;

    const questions = levelQuestionsArr[currentLevelIdx];
    const answered = Object.keys(userAnswers).length;
    if (answered < questions.length) {
      alert(`এই লেভেলের ${questions.length}টি প্রশ্নের মধ্যে আপনি ${answered}টির উত্তর দিয়েছেন। সবগুলোর উত্তর দিন!`);
      return;
    }

    let levelScore = 0;
    questions.forEach((q, idx) => {
      if (userAnswers[idx] === q.correct) levelScore++;
    });

    levelScores[currentLevelIdx] = levelScore;
    cumulativeTotal += levelScore;
    levelLocked = true;

    lockCurrentLevelOptions();
    renderLevelProgress();
    updateFooter();

    const btn = document.getElementById('actionBtn');
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>সংরক্ষণ হচ্ছে...';
    btn.disabled = true;

    await saveProgress();

    setActionButton('next');
  }

  // ---------- Move to next level ----------
  function goToNextLevel() {
    if (currentLevelIdx >= 5) return;
    currentLevelIdx++;
    renderLevel(currentLevelIdx);
  }

  // ---------- Final wrap-up after Level 6 is submitted (data already saved) ----------
  function finishPretest() {
    if (quizSubmitted) return;
    quizSubmitted = true;
    if (timerInterval) clearInterval(timerInterval);

    alert(`আপনি প্রিটেস্টে ${cumulativeTotal} / 30 সঠিক উত্তর দিয়েছেন! আপনার ফলাফল সংরক্ষণ করা হয়েছে।`);
    createConfetti();

    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 2000);
  }

  // ---------- Timer ----------
  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timeSeconds = 1200;
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      if (timeSeconds <= 0) {
        clearInterval(timerInterval);
        alert('সময় শেষ! এখন পর্যন্ত যা উত্তর দিয়েছেন তা সংরক্ষণ করা হচ্ছে।');
        forceTimeUp();
      } else {
        timeSeconds--;
        updateTimerDisplay();
      }
    }, 1000);
  }

  function updateTimerDisplay() {
    const mins = Math.floor(timeSeconds / 60);
    const secs = timeSeconds % 60;
    document.getElementById('timerDisplay').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
  }

  // If time runs out mid-level: grade whatever was answered in the current
  // level, save it, then finish (whatever levels were already done stay saved).
  async function forceTimeUp() {
    if (quizSubmitted) return;
    if (!levelLocked) {
      const questions = levelQuestionsArr[currentLevelIdx];
      let levelScore = 0;
      questions.forEach((q, idx) => {
        if (userAnswers[idx] === q.correct) levelScore++;
      });
      levelScores[currentLevelIdx] = levelScore;
      cumulativeTotal += levelScore;
      levelLocked = true;
      await saveProgress();
    }
    finishPretest();
  }

  function createConfetti() {
    for (let i = 0; i < 60; i++) {
      const confetti = document.createElement('div');
      confetti.style.position = 'fixed';
      confetti.style.width = '8px';
      confetti.style.height = '8px';
      confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 60%)`;
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.top = '-10px';
      confetti.style.pointerEvents = 'none';
      confetti.style.zIndex = '2000';
      confetti.style.animation = `confettiFall ${0.8 + Math.random() * 1}s ease-out forwards`;
      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 2000);
    }
  }

  // ---------- Load any existing progress, then start/resume the quiz ----------
  async function loadProgressAndStart() {
    try {
      const userDoc = await db.collection('all_results').doc(currentUser).get();
      if (userDoc.exists) {
        const data = userDoc.data();
        const completed = data.pretestLevelsCompleted || 0;

        if (completed >= 6) {
          alert(`আপনি ইতিমধ্যে প্রিটেস্ট সম্পন্ন করেছেন! আপনার স্কোর: ${data.pretestScore || 0}/30`);
          window.location.href = 'dashboard.html';
          return;
        } else if (completed > 0) {
          // Resume from the next un-finished level
          currentLevelIdx = completed;
          cumulativeTotal = data.pretestScore || 0;
          for (let i = 0; i < completed; i++) {
            const v = data[`pretestL${i + 1}`];
            levelScores[i] = (v !== undefined) ? v : null;
          }
        }
      }
    } catch (e) {
      console.log("Check pretest error:", e);
    }

    renderLevel(currentLevelIdx);
    startTimer();
  }

  auth.onAuthStateChanged(async (user) => {
    if (user) {
      currentUser = user.uid;
      console.log("User ID:", currentUser);
      await loadProgressAndStart();
    } else {
      try {
        const userCredential = await auth.signInAnonymously();
        currentUser = userCredential.user.uid;
        await loadProgressAndStart();
      } catch(e) {
        console.error("Auth error:", e);
        renderLevel(currentLevelIdx);
        startTimer();
      }
    }
  });

  const style = document.createElement('style');
  style.textContent = `@keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(360deg); opacity: 0; } }`;
  document.head.appendChild(style);
</script>
</body>
