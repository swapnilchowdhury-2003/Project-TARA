    { level: 6, story: "Multiply(৪,৫) → ২০", text: "এখানে ৪ ও ৫ কী এবং ২০ কী?", options: ["৪,৫=Return, ২০=Parameter", "৪,৫=Parameter, ২০=Return", "৪,৫=Function, ২০=Loop", "৪,৫=Loop, ২০=Function"], correct: 1 }
  ];
  
  // Combine all questions (30 total)
  const allQuestions = [
    ...level1Questions, ...level2Questions, ...level3Questions,
    ...level4Questions, ...level5Questions, ...level6Questions
  ];
  
  function getLevelBadgeClass(level) {
    const classes = { 1: 'level1', 2: 'level2', 3: 'level3', 4: 'level4', 5: 'level5', 6: 'level6' };
    return classes[level] || 'level1';
  }
  
  function renderQuestions() {
    const container = document.getElementById('questionsContainer');
    container.innerHTML = '';
    userAnswers = {};
    
    allQuestions.forEach((q, idx) => {
      const qDiv = document.createElement('div');
      qDiv.className = 'question-card';
      qDiv.id = `q-${idx}`;
      
      const levelBadge = `<div class="level-badge ${getLevelBadgeClass(q.level)}">📚 লেভেল ${q.level}</div>`;
      let storyHtml = q.story ? `<div class="story-box"><i class="fa-solid fa-comment-dots me-1"></i> ${q.story}</div>` : '';
      let matrixHtml = '';
      if (q.matrix && q.getMatrixHTML) {
        matrixHtml = q.getMatrixHTML();
      }
      
      qDiv.innerHTML = `
        ${levelBadge}
        ${storyHtml}
        ${matrixHtml}
        <div class="question-text">📝 প্রশ্ন ${idx+1}: ${q.text}</div>
        <div class="options" id="options-${idx}"></div>
      `;
      container.appendChild(qDiv);
      
      const optsDiv = document.getElementById(`options-${idx}`);
      q.options.forEach((opt, optIdx) => {
        const optBtn = document.createElement('div');
        optBtn.className = 'option-btn';
        optBtn.textContent = opt;
        optBtn.onclick = () => selectAnswer(idx, optIdx, optBtn);
        optsDiv.appendChild(optBtn);
      });
    });
    
    document.getElementById('totalQuestions').innerText = allQuestions.length;
    document.getElementById('scoreDisplay').innerText = '0';
  }
  
  function selectAnswer(qIdx, optIdx, btnElement) {
    if (quizSubmitted) return;
    const optsDiv = document.getElementById(`options-${qIdx}`);
    const btns = optsDiv.querySelectorAll('.option-btn');
    btns.forEach(btn => btn.classList.remove('selected-correct'));
    btnElement.classList.add('selected-correct');
    userAnswers[qIdx] = optIdx;
    updateProgress();
  }
  
  function updateProgress() {
    const answered = Object.keys(userAnswers).length;
    document.getElementById('scoreDisplay').innerText = answered;
  }
  
  function calculateScore() {
    let score = 0;
    for (let i = 0; i < allQuestions.length; i++) {
      if (userAnswers[i] !== undefined && userAnswers[i] === allQuestions[i].correct) {
        score++;
      }
    }
    return score;
  }
  
  async function submitQuiz() {
    if (quizSubmitted) {
      alert('আপনি ইতিমধ্যে প্রিটেস্ট জমা দিয়েছেন!');
      return;
    }
    
    const answeredCount = Object.keys(userAnswers).length;
    if (answeredCount < allQuestions.length) {
      alert(`আপনি ${answeredCount} টি প্রশ্নের উত্তর দিয়েছেন। সব ${allQuestions.length} টি প্রশ্নের উত্তর দিন!`);
      return;
    }
    
    const score = calculateScore();
    
    if (currentUser) {
      try {
        const userDocRef = db.collection('all_results').doc(currentUser);
        await userDocRef.set({
          pretestScore: score,
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        console.log(`Pretest score saved: ${score}/30`);
        alert(`আপনি প্রিটেস্টে ${score} / 30 সঠিক উত্তর দিয়েছেন!`);
      } catch (e) {
        console.error("Firebase error:", e);
        alert(`আপনি ${score} / 30 সঠিক উত্তর দিয়েছেন! (ডাটা সংরক্ষণ হয়নি)`);
      }
    } else {
      alert(`আপনি ${score} / 30 সঠিক উত্তর দিয়েছেন!`);
    }
    
    quizSubmitted = true;
    createConfetti();
    
    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 2000);
  }
  
  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timeSeconds = 1200;
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      if (timeSeconds <= 0) {
        clearInterval(timerInterval);
        alert('সময় শেষ! এখন জমা দিতে হবে।');
        submitQuiz();
      } else {
        timeSeconds--;
        updateTimerDisplay();
      }
    }, 1000);
  }
  
  function updateTimerDisplay() {
    const mins = Math.floor(timeSeconds / 60);
    const secs = timeSeconds % 60;
    document.getElementById('timerDisplay').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
  }
  
  function createConfetti() {
    for (let i = 0; i < 60; i++) {
      const confetti = document.createElement('div');
      confetti.style.position = 'fixed';
      confetti.style.width = '8px';
      confetti.style.height = '8px';
      confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 60%)`;
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.top = '-10px';
      confetti.style.pointerEvents = 'none';
      confetti.style.zIndex = '2000';
      confetti.style.animation = `confettiFall ${0.8 + Math.random() * 1}s ease-out forwards`;
      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 2000);
    }
  }
  
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      currentUser = user.uid;
      console.log("User ID:", currentUser);
      
      try {
        const userDoc = await db.collection('all_results').doc(currentUser).get();
        if (userDoc.exists && userDoc.data().pretestScore > 0) {
          const existingScore = userDoc.data().pretestScore;
          alert(`আপনি ইতিমধ্যে প্রিটেস্ট দিয়েছেন! আপনার স্কোর: ${existingScore}/30`);
          window.location.href = 'dashboard.html';
          return;
        }
      } catch(e) { console.log("Check pretest error:", e); }
      
      renderQuestions();
      startTimer();
    } else {
      try {
        const userCredential = await auth.signInAnonymously();
        currentUser = userCredential.user.uid;
        renderQuestions();
        startTimer();
      } catch(e) {
        console.error("Auth error:", e);
        renderQuestions();
        startTimer();
      }
    }
  });
  
  document.getElementById('submitBtn').addEventListener('click', submitQuiz);
  
  const style = document.createElement('style');
  style.textContent = `@keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(360deg); opacity: 0; } }`;
  document.head.appendChild(style);
</script>
</body>
</html>
