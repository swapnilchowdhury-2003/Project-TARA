    .option-btn {

      border: 2px solid #ff8c00;

      padding: 0.5rem 1rem;
      cursor: pointer;

      padding-top: 1rem;

    .feedback-msg.wrong { color: #ff8888; }
    .next-btn { background: linear-gradient(135deg, #ff8c00, #ff2e63); border: none; padding: 0.7rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 60px; color: white; cursor: pointer; width: 100%; margin-top: 1rem; }

    { text: "❌ মিথ্যা", story: "🍎🍎🍎🍎🍎 (৫টি আপেল)। বিবৃতি: 'এখানে ৪টি আপেল আছে' - এটি সত্য না মিথ্যা?", options: ["✅ সত্য", "❌ মিথ্যা"], correct: 1 },
    { text: "✅ সত্য", story: "🍎🍎🍎🍎 (৪টি আপেল)। বিবৃতি: 'এখানে ৪টি আপেল আছে' - এটি সত্য না মিথ্যা?", options: ["✅ সত্য", "❌ মিথ্যা"], correct: 0 },

    { text: "ভেরিয়েবল", story: "মিতুর বাক্সের নাম 'ToyBox'। প্রথমে ৫টি বই, পরে ৯টি কলম। এখানে 'ToyBox' কী?", options: ["ভেরিয়েবল", "কনস্ট্যান্ট", "ডাটা টাইপ", "লুপ"], correct: 0 },

    { text: "১০০ - ৩০ = ৭০", story: "মায়ের কাছে ১০০ টাকা ছিল। ৩০ টাকার সবজি কিনলেন। বাকি কত? এক্সপ্রেশন কী?", options: ["১০০ + ৩০ = ১৩০", "১০০ - ৩০ = ৭০", "১০০ × ৩০ = ৩০০০", "১০০ ÷ ৩০ = ৩.৩৩"], correct: 1 },
    { text: "৬টি", story: "রিতা প্রতিদিন ২টি চকলেট খায়। সোম, মঙ্গল, বুধবার খেল। মোট কত খেল? (কাউন্টার)", options: ["৪টি", "৫টি", "৬টি", "৮টি"], correct: 2 },
    { text: "৬ জন", story: "একটি বাসে: ১ম স্টপে ৫ জন উঠল, ২য় স্টপে ৩ জন উঠল, ৩য় স্টপে ২ জন নামল। বাসে কতজন? (কাউন্টার)", options: ["১০ জন", "৮ জন", "৬ জন", "৫ জন"], correct: 2 },
    { text: "৮টি", story: "রিতা প্রতিদিন ২টি চকলেট খায়। সোম, মঙ্গল, বুধ, বৃহস্পতিবার খেল। মোট কত?", options: ["৪টি", "৬টি", "৮টি", "১০টি"], correct: 2 },

  const level3Questions = [
    { text: "ছাতা নিবো", story: "বৃষ্টি হলে ছাতা নিবো। এখন বৃষ্টি হচ্ছে। আমি কী করব?", options: ["ছাতা নিবো না", "ছাতা নিবো", "ঘর থেকে বের হবো না", "খেলতে যাবো"], correct: 1 },

    { text: "🐶 কুকুর", story: "🐱🐶🐱🐶🐱 — পরবর্তী প্রাণী কোনটি?", options: ["🐱 বিড়াল", "🐶 কুকুর", "🐭 ইঁদুর", "🐦 পাখি"], correct: 1 },
    { text: "১০০ টাকা", story: "একবার মাঠ ঘুরলে ১০ টাকা। ১০ বার ঘুরলে কত টাকা পাবে? (Loop)", options: ["৫০ টাকা", "৮০ টাকা", "১০০ টাকা", "১২০ টাকা"], correct: 2 },
    { text: "১০০ পৃষ্ঠা", story: "কপি মেশিন ১ মিনিটে ২০ পৃষ্ঠা প্রিন্ট করে। ৫ মিনিটে কত পৃষ্ঠা প্রিন্ট করবে?", options: ["৮০ পৃষ্ঠা", "১০০ পৃষ্ঠা", "১২০ পৃষ্ঠা", "১৪০ পৃষ্ঠা"], correct: 1 },
    { text: "৩,৪,৫", story: "ক্লাস ৩ থেকে ৫ পর্যন্ত প্রতিযোগিতা। কোন ক্লাসগুলো অংশ নিতে পারবে?", options: ["১,২,৩", "২,৩,৪", "৩,৪,৫", "৪,৫,৬"], correct: 2 },
    { text: "৪,৫,৬,৭", story: "১ থেকে ১০ নম্বর গাছের মধ্যে ৪ থেকে ৭ নম্বর গাছে পানি দিতে হবে। কোন গুলো?", options: ["২,৩,৪,৫", "৩,৪,৫,৬", "৪,৫,৬,৭", "৫,৬,৭,৮"], correct: 2 }
  ];
  
  // LEVEL 4 QUESTIONS (Accumulator, Indexing, Sorting, Break, Prime)
  const level4Questions = [
    { text: "৯টি", story: "TotalFruits বাক্সে প্রথমে ৩টি আম, তারপর ২টি কাঁঠাল, তারপর ৪টি আপেল রাখলে মোট কত ফল? (Accumulator)", options: ["৭টি", "৮টি", "৯টি", "১০টি"], correct: 2 },
    { text: "১৭টি", story: "রিয়া সোম ৫টি, মঙ্গল ৩টি, বুধ ৭টি, বৃহস্পতি ২টি বীজ জমাল। মোট কত বীজ?", options: ["১৫টি", "১৬টি", "১৭টি", "১৮টি"], correct: 2 },
    { text: "🍈 কাঁঠাল", story: "বাক্স: ইনডেক্স ০=🥭, ১=🍈, ২=🍎, ৩=🍌। ইনডেক্স ১-এ কী আছে?", options: ["🥭 আম", "🍈 কাঁঠাল", "🍎 আপেল", "🍌 কলা"], correct: 1 },
    { text: "🍌 কলা", story: "উপরের বাক্সে ইনডেক্স ৩-এ কী আছে?", options: ["🥭 আম", "🍈 কাঁঠাল", "🍎 আপেল", "🍌 কলা"], correct: 3 },
    { text: "২,৪,৭,৯", story: "[৭,২,৯,৪] ছোট থেকে বড় সাজালে কী হবে?", options: ["৯,৭,৪,২", "২,৪,৭,৯", "৪,২,৭,৯", "৭,৪,২,৯"], correct: 1 },
    { text: "আম, আপেল, আঙ্গুর, কলা, কমলা", story: "ফল: কলা, আপেল, কমলা, আঙ্গুর, আম — বাংলা বর্ণমালার ক্রমে সাজালে?", options: ["আম, আপেল, আঙ্গুর, কলা, কমলা", "আপেল, আম, আঙ্গুর, কলা, কমলা", "আঙ্গুর, আম, আপেল, কমলা, কলা", "কমলা, কলা, আঙ্গুর, আম, আপেল"], correct: 0 },
    { text: "৭ বার", story: "রনি ১০ বার দৌড়াতে গিয়ে ৭ বার দৌড়িয়ে থেমে গেল (Break)। কতবার দৌড়াল?", options: ["৫ বার", "৬ বার", "৭ বার", "১০ বার"], correct: 2 },
    { text: "১৪ পর্যন্ত", story: "লুপ ১-২০ প্রিন্ট করবে, ১৫ পেলে Break। কোন সংখ্যা পর্যন্ত প্রিন্ট করবে?", options: ["১০ পর্যন্ত", "১৪ পর্যন্ত", "১৫ পর্যন্ত", "২০ পর্যন্ত"], correct: 1 },
    { text: "৭", story: "নিচের কোনটি মৌলিক সংখ্যা?", options: ["৪", "৬", "৭", "৯"], correct: 2 },
    { text: "৯", story: "নিচের কোনটি মৌলিক সংখ্যা নয় (যৌগিক)?", options: ["২", "৩", "৫", "৯"], correct: 3 }
  ];
  
  // LEVEL 5 QUESTIONS (Continue, Nested Loop, Factorial, Fibonacci, Array, Searching, String, Reverse, Palindrome)
  const level5Questions = [
    { text: "১,৩,৫,৭,৯", story: "১-১০ পর্যন্ত জোড় সংখ্যা বাদ দিতে বলা হলো (Continue)। কোন সংখ্যা বলবে?", options: ["১,৩,৫,৭,৯", "২,৪,৬,৮,১০", "১,২,৩,৪,৫", "৫,৬,৭,৮,৯,১০"], correct: 0 },
    { text: "৮টি", story: "১০টি স্টপের মধ্যে ৩ ও ৭ নম্বর স্টপে কেউ নেই (Continue)। কয়টি স্টপে থামবে?", options: ["১০টি", "৯টি", "৮টি", "৭টি"], correct: 2 },
    { text: "১২ বার", story: "বাইরের লুপ ৩ বার, ভিতরের লুপ ৪ বার। মোট কতবার ভিতরের কাজ হবে? (Nested Loop)", options: ["৭ বার", "১২ বার", "১৫ বার", "২০ বার"], correct: 1 },
    { text: "৩০টি", story: "৫টি ক্লাস, প্রতিটিতে ৬টি সেকশন। মোট কত সেকশন?", options: ["১১টি", "২৫টি", "৩০টি", "৩৫টি"], correct: 2 },
    { text: "১২০", story: "৫! = ১×২×৩×৪×৫ = কত?", options: ["৬০", "১০০", "১২০", "১৫০"], correct: 2 },
    { text: "৮", story: "Fibonacci: ১,১,২,৩,৫,___ পরবর্তী সংখ্যা কত?", options: ["৬", "৭", "৮", "৯"], correct: 2 },
    { text: "🍊 কমলা", story: "অ্যারে ['🍎','🍌','🍊','🍇','🥭'] - ইনডেক্স ২-এ কী?", options: ["🍎 আপেল", "🍊 কমলা", "🍇 আঙ্গুর", "🥭 আম"], correct: 1 },
    { text: "৫ম ধাপে", story: "অ্যারে [৫,২,৮,১,৯,৩] - লিনিয়ার সার্চে ৯ কত ধাপে পাবে?", options: ["৩য় ধাপে", "৪র্থ ধাপে", "৫ম ধাপে", "৬ষ্ঠ ধাপে"], correct: 2 },
    { text: "ANANAB", story: '"BANANA" উল্টালে কী হয়?', options: ["BANANA", "ANANAB", "NABANA", "ANANAB"], correct: 1 },
    { text: "MADAM", story: "নিচের কোনটি প্যালিন্ড্রোম?", options: ["APPLE", "BANANA", "MADAM", "MANGO"], correct: 2 }
  ];
  
  // LEVEL 6 QUESTIONS (Matrix, Function, Parameter, Return Value)
  const level6Questions = [
    { text: "৯", story: "Matrix: সারি ১, কলাম ২-এ ([১][২]) কোন সংখ্যা আছে?", options: ["৭", "৩", "৯", "৬"], correct: 2 },
    { text: "৫", story: "Matrix: সারি ০, কলাম ০-এ ([০][০]) কোন সংখ্যা আছে?", options: ["৫", "৮", "২", "৪"], correct: 0 },
    { text: "৩×৪", story: "৩টি সারি এবং ৪টি কলামের ম্যাট্রিক্সের মাপ কত?", options: ["৩×৩", "৩×৪", "৪×৩", "৪×৪"], correct: 1 },
    { text: "ফাংশন", story: "রান্নার রেসিপি (ডিম, চিনি, মেশানো, ওভেন) প্রোগ্রামিংয়ে কী?", options: ["ভেরিয়েবল", "লুপ", "ফাংশন", "অ্যারে"], correct: 2 },
    { text: "ফাংশন", story: '"চা বানাও" কমান্ডটি কী?', options: ["ভেরিয়েবল", "ফাংশন", "লুপ", "অ্যারে"], correct: 1 },
    { text: "প্যারামিটার", story: '"২ কাপ চা বানাও" - এখানে "২ কাপ" কী?', options: ["ফাংশন", "রিটার্ন ভ্যালু", "প্যারামিটার", "লুপ"], correct: 2 },
    { text: "৩টি", story: '"৩টা ডিম, ২ কাপ দুধ, ১ কাপ চিনি" - কয়টি প্যারামিটার?', options: ["১টি", "২টি", "৩টি", "৪টি"], correct: 2 },
    { text: "রিটার্ন ভ্যালু", story: "যোগ মেশিনে ৫+৩=৮ - এখানে ৮ কী?", options: ["প্যারামিটার", "রিটার্ন ভ্যালু", "ফাংশন", "লুপ"], correct: 1 },
    { text: "রিটার্ন ভ্যালু", story: "কেক মেশিন কেক রিটার্ন করল। কেক কী?", options: ["প্যারামিটার", "ফাংশন", "রিটার্ন ভ্যালু", "ইনপুট"], correct: 2 },
    { text: "৪,৫=প্যারামিটার, ২০=রিটার্ন", story: "Multiply(৪,৫) → ২০। এখানে ৪,৫ কী এবং ২০ কী?", options: ["৪,৫=Return, ২০=Parameter", "৪,৫=Parameter, ২০=Return", "৪,৫=Function, ২০=Loop", "৪,৫=Loop, ২০=Function"], correct: 1 }
  ];
  
  const allLevelQuestions = {
    1: level1Questions, 2: level2Questions, 3: level3Questions,
    4: level4Questions, 5: level5Questions, 6: level6Questions
  };
  
  let currentQuestions = [];
  
  function renderQuestions() {
    const container = document.getElementById('questionsContainer');
    container.innerHTML = '';
    userAnswers = {};
    
    currentQuestions.forEach((q, idx) => {
      const qDiv = document.createElement('div');
      qDiv.className = 'question-card';
      qDiv.id = `q-${idx}`;
      qDiv.innerHTML = `
        <div class="story-box"><i class="fa-solid fa-comment-dots me-1"></i> ${q.story}</div>
        <div class="question-text">📝 প্রশ্ন ${idx+1}: ${q.text} সঠিক উত্তর কোনটি?</div>
        <div class="options" id="options-${idx}"></div>
        <div class="feedback-msg" id="fb-${idx}"></div>
      `;
      container.appendChild(qDiv);
      
      const optsDiv = document.getElementById(`options-${idx}`);
      q.options.forEach((opt, optIdx) => {
        const optBtn = document.createElement('div');
        optBtn.className = 'option-btn';
        optBtn.textContent = opt;
        optBtn.onclick = () => selectAnswer(idx, optIdx, optBtn);
        optsDiv.appendChild(optBtn);
      });
    });
    
    document.getElementById('totalQuestions').innerText = currentQuestions.length;
    document.getElementById('scoreDisplay').innerText = '0';
    updateProgressDots();
  }
  
  function selectAnswer(qIdx, optIdx, btnElement) {
    if (quizSubmitted) return;
    const optsDiv = document.getElementById(`options-${qIdx}`);
    const btns = optsDiv.querySelectorAll('.option-btn');
    btns.forEach(btn => btn.classList.remove('selected-correct', 'selected-wrong'));
    btnElement.classList.add('selected-correct');
    userAnswers[qIdx] = optIdx;
    updateProgressDots();
  }
  
  function updateProgressDots() {
    const answered = Object.keys(userAnswers).length;
    document.getElementById('scoreDisplay').innerText = answered;
  }
  
  function calculateScore() {
    let score = 0;
    for (let i = 0; i < currentQuestions.length; i++) {
      if (userAnswers[i] !== undefined && userAnswers[i] === currentQuestions[i].correct) {
        score++;
      }
    }
    return score;
  }
  
  async function submitQuiz() {
    if (quizSubmitted) {
      alert('আপনি ইতিমধ্যে এই লেভেলের কুইজ জমা দিয়েছেন!');
      return;
    }
    
    const answeredCount = Object.keys(userAnswers).length;
    if (answeredCount < currentQuestions.length) {
      alert(`আপনি ${answeredCount} টি প্রশ্নের উত্তর দিয়েছেন। সবগুলো প্রশ্নের উত্তর দিন!`);
      return;
    }
    
    const score = calculateScore();
    const total = currentQuestions.length;
    
    for (let i = 0; i < currentQuestions.length; i++) {
      const fbDiv = document.getElementById(`fb-${i}`);
      const isCorrect = (userAnswers[i] !== undefined && userAnswers[i] === currentQuestions[i].correct);
      if (isCorrect) {
        fbDiv.innerHTML = '✅ সঠিক! চমৎকার! 🎉';
        fbDiv.className = 'feedback-msg ok';
      } else {
        const correctAns = currentQuestions[i].options[currentQuestions[i].correct];
        fbDiv.innerHTML = `❌ ভুল! সঠিক উত্তর: ${correctAns}`;
        fbDiv.className = 'feedback-msg wrong';
      }
    }
    
    alert(`আপনি ${score} / ${total} সঠিক উত্তর দিয়েছেন!`);
    
    if (currentUser) {
      try {
        const levelKey = `level${currentLevel}Score`;
        const userDocRef = db.collection('all_results').doc(currentUser);
        await userDocRef.set({
          [levelKey]: score,
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        console.log(`Level ${currentLevel} score saved: ${score}`);
      } catch (e) { console.error("Firebase error:", e); }
    }
    
    quizSubmitted = true;
    createConfetti();
  }
  
  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timeSeconds = 300;
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      if (timeSeconds <= 0) {
        clearInterval(timerInterval);
        alert('সময় শেষ! এখন জমা দিতে হবে।');
        submitQuiz();
      } else {
        timeSeconds--;
        updateTimerDisplay();
      }
    }, 1000);
  }
  
  function updateTimerDisplay() {
    const mins = Math.floor(timeSeconds / 60);
    const secs = timeSeconds % 60;
    document.getElementById('timerDisplay').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
  }
  
  function createConfetti() {
    for (let i = 0; i < 60; i++) {
      const confetti = document.createElement('div');
      confetti.style.position = 'fixed';
      confetti.style.width = '8px';
      confetti.style.height = '8px';
      confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 60%)`;
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.top = '-10px';
      confetti.style.pointerEvents = 'none';
      confetti.style.zIndex = '2000';
      confetti.style.animation = `confettiFall ${0.8 + Math.random() * 1}s ease-out forwards`;
      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 2000);
    }
  }
  
  function loadLevel(level) {
    currentLevel = level;
    currentQuestions = [...allLevelQuestions[level]];
    userAnswers = {};
    quizSubmitted = false;
    document.getElementById('levelTitle').innerHTML = getLevelIcon(level);
    document.getElementById('scoreDisplay').innerText = '0';
    renderQuestions();
    startTimer();
    
    document.querySelectorAll('.level-btn').forEach(btn => {
      btn.classList.remove('active');
      if (parseInt(btn.dataset.level) === level) btn.classList.add('active');
    });
  }
  
  function getLevelIcon(level) {
    const icons = { 1: "🧩 লেভেল ১ কুইজ", 2: "🧮 লেভেল ২ কুইজ", 3: "🌲 লেভেল ৩ কুইজ", 4: "⛰️ লেভেল ৪ কুইজ", 5: "🌀 লেভেল ৫ কুইজ", 6: "🏰 লেভেল ৬ কুইজ" };
    return icons[level];
  }
  
  auth.signInAnonymously().then((userCredential) => {
    currentUser = userCredential.user.uid;
    console.log("Logged in as:", currentUser);
    loadLevel(1);
  }).catch((error) => { console.error("Auth error:", error); loadLevel(1); });
  
  document.querySelectorAll('.level-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!quizSubmitted || confirm('কুইজ জমা না দিয়ে লেভেল বদলালে অগ্রগতি হারাবে। নিশ্চিত?')) {
        loadLevel(parseInt(btn.dataset.level));
      }
    });
  });
  
  document.getElementById('submitBtn').addEventListener('click', submitQuiz);
  
  const style = document.createElement('style');
  style.textContent = `@keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(360deg); opacity: 0; } }`;
  document.head.appendChild(style);
</script>

</body>
</html>
