      border-radius: 15px;
      padding: 0.8rem;
      margin: 0.5rem 0;

      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin: 0.2rem 0;

      padding: 0.3rem 0.6rem;

    { story: "কপি মেশিন ১ মিনিটে ২০ পৃষ্ঠা প্রিন্ট করে। ৫ মিনিটে কত পৃষ্ঠা প্রিন্ট করবে?", text: "কত পৃষ্ঠা প্রিন্ট করবে?", options: ["৮০ পৃষ্ঠা", "১০০ পৃষ্ঠা", "১২০ পৃষ্ঠা", "১৪০ পৃষ্ঠা"], correct: 1 },

    { story: "১ থেকে ১০ নম্বর গাছের মধ্যে ৪ থেকে ৭ নম্বর গাছে পানি দিতে হবে।", text: "কোন গুলো?", options: ["২,৩,৪,৫", "৩,৪,৫,৬", "৪,৫,৬,৭", "৫,৬,৭,৮"], correct: 2 }
  ];
  
  // LEVEL 4 QUESTIONS
  const level4Questions = [
    { story: "TotalFruits বাক্সে প্রথমে ৩টি আম, তারপর ২টি কাঁঠাল, তারপর ৪টি আপেল রাখলে", text: "মোট কত ফল? (Accumulator)", options: ["৭টি", "৮টি", "৯টি", "১০টি"], correct: 2 },
    { story: "রিয়া সোম ৫টি, মঙ্গল ৩টি, বুধ ৭টি, বৃহস্পতি ২টি বীজ জমাল।", text: "মোট কত বীজ?", options: ["১৫টি", "১৬টি", "১৭টি", "১৮টি"], correct: 2 },
    { story: "বাক্স: ইনডেক্স ০=🥭, ১=🍈, ২=🍎, ৩=🍌", text: "ইনডেক্স ১-এ কী আছে?", options: ["🥭 আম", "🍈 কাঁঠাল", "🍎 আপেল", "🍌 কলা"], correct: 1 },
    { story: "উপরের বাক্সে ইনডেক্স ৩-এ কী আছে?", text: "ইনডেক্স ৩-এ কী আছে?", options: ["🥭 আম", "🍈 কাঁঠাল", "🍎 আপেল", "🍌 কলা"], correct: 3 },
    { story: "[৭,২,৯,৪] ছোট থেকে বড় সাজাতে চায়।", text: "সঠিক সাজানো ক্রম কোনটি?", options: ["৯,৭,৪,২", "২,৪,৭,৯", "৪,২,৭,৯", "৭,৪,২,৯"], correct: 1 },
    { story: "ফল: কলা, আপেল, কমলা, আঙ্গুর, আম — বাংলা বর্ণমালার ক্রমে সাজালে?", text: "সঠিক ক্রম কোনটি?", options: ["আম, আপেল, আঙ্গুর, কলা, কমলা", "আপেল, আম, আঙ্গুর, কলা, কমলা", "আঙ্গুর, আম, আপেল, কমলা, কলা", "কমলা, কলা, আঙ্গুর, আম, আপেল"], correct: 0 },
    { story: "রনি ১০ বার দৌড়াতে গিয়ে ৭ বার দৌড়িয়ে থেমে গেল (Break)।", text: "সে কতবার দৌড়াল?", options: ["৫ বার", "৬ বার", "৭ বার", "১০ বার"], correct: 2 },
    { story: "লুপ ১-২০ প্রিন্ট করবে, ১৫ পেলে Break।", text: "কোন সংখ্যা পর্যন্ত প্রিন্ট করবে?", options: ["১০ পর্যন্ত", "১৪ পর্যন্ত", "১৫ পর্যন্ত", "২০ পর্যন্ত"], correct: 1 },
    { text: "নিচের কোনটি মৌলিক সংখ্যা?", options: ["৪", "৬", "৭", "৯"], correct: 2 },
    { text: "নিচের কোনটি মৌলিক সংখ্যা নয় (যৌগিক)?", options: ["২", "৩", "৫", "৯"], correct: 3 }
  ];
  
  // LEVEL 5 QUESTIONS
  const level5Questions = [
    { story: "১-১০ পর্যন্ত জোড় সংখ্যা বাদ দিতে বলা হলো (Continue)।", text: "কোন সংখ্যা বলবে?", options: ["১,৩,৫,৭,৯", "২,৪,৬,৮,১০", "১,২,৩,৪,৫", "৫,৬,৭,৮,৯,১০"], correct: 0 },
    { story: "১০টি স্টপের মধ্যে ৩ ও ৭ নম্বর স্টপে কেউ নেই (Continue)।", text: "কয়টি স্টপে থামবে?", options: ["১০টি", "৯টি", "৮টি", "৭টি"], correct: 2 },
    { story: "বাইরের লুপ ৩ বার, ভিতরের লুপ ৪ বার। (Nested Loop)", text: "মোট কতবার ভিতরের কাজ হবে?", options: ["৭ বার", "১২ বার", "১৫ বার", "২০ বার"], correct: 1 },
    { story: "৫টি ক্লাস, প্রতিটিতে ৬টি সেকশন।", text: "মোট কত সেকশন?", options: ["১১টি", "২৫টি", "৩০টি", "৩৫টি"], correct: 2 },
    { story: "৫! = ১×২×৩×৪×৫", text: "ফ্যাক্টরিয়ালের মান কত?", options: ["৬০", "১০০", "১২০", "১৫০"], correct: 2 },
    { story: "Fibonacci: ১,১,২,৩,৫,___", text: "পরবর্তী সংখ্যা কত?", options: ["৬", "৭", "৮", "৯"], correct: 2 },
    { story: "অ্যারে ['🍎','🍌','🍊','🍇','🥭']", text: "ইনডেক্স ২-এ কী আছে?", options: ["🍎 আপেল", "🍊 কমলা", "🍇 আঙ্গুর", "🥭 আম"], correct: 1 },
    { story: "অ্যারে [৫,২,৮,১,৯,৩] - লিনিয়ার সার্চে ৯ খুঁজতে", text: "কত ধাপে পাবে?", options: ["৩য় ধাপে", "৪র্থ ধাপে", "৫ম ধাপে", "৬ষ্ঠ ধাপে"], correct: 2 },
    { story: '"BANANA" শব্দটি উল্টালে', text: "কী হয়?", options: ["BANANA", "ANANAB", "NABANA", "ANANAB"], correct: 1 },
    { story: "প্যালিন্ড্রোম হলো উল্টালেও একই থাকে।", text: "নিচের কোনটি প্যালিন্ড্রোম?", options: ["APPLE", "BANANA", "MADAM", "MANGO"], correct: 2 }
  ];
  
  // LEVEL 6 QUESTIONS with Matrix Visual
  const matrixData = [[5,8,2],[7,3,9],[4,1,6]];
  
  function getMatrixVisualHTML() {
    let html = '<div class="matrix-visual"><div class="matrix-row"><div class="matrix-cell"></div><div class="matrix-cell">কলাম 0</div><div class="matrix-cell">কলাম 1</div><div class="matrix-cell">কলাম 2</div></div>';
    for (let i = 0; i < 3; i++) {
      html += `<div class="matrix-row"><div class="matrix-cell">সারি ${i}</div>`;
      for (let j = 0; j < 3; j++) {
        html += `<div class="matrix-cell">${matrixData[i][j]}</div>`;
      }
      html += '</div>';
    }
    html += '</div>';
    return html;
  }
  
  const level6Questions = [
    { story: "নিচের ম্যাট্রিক্সটি দেখো:", text: "সারি ১, কলাম ২ - অর্থাৎ [১][২] - তে কোন সংখ্যা আছে?", matrix: true, correct: 9, getMatrixHTML: getMatrixVisualHTML, options: ["৭", "৩", "৯", "৬"] },
    { story: "উপরের একই ম্যাট্রিক্স দেখো।", text: "সারি ০, কলাম ০ - অর্থাৎ [০][০] - তে কোন সংখ্যা আছে?", matrix: true, correct: 5, getMatrixHTML: getMatrixVisualHTML, options: ["৫", "৮", "২", "৪"] },
    { story: "একটি ম্যাট্রিক্সের ৩টি সারি এবং ৪টি কলাম আছে।", text: "এই ম্যাট্রিক্সটির মাপ কত?", options: ["৩×৩", "৩×৪", "৪×৩", "৪×৪"], correct: 1 },
    { story: "রান্নার রেসিপি (ডিম, চিনি, মেশানো, ওভেন)", text: "প্রোগ্রামিংয়ে এটাকে কী বলে?", options: ["ভেরিয়েবল", "লুপ", "ফাংশন", "অ্যারে"], correct: 2 },
    { story: '"চা বানাও" কমান্ডটি', text: "প্রোগ্রামিংয়ে কী?", options: ["ভেরিয়েবল", "ফাংশন", "লুপ", "অ্যারে"], correct: 1 },
    { story: '"২ কাপ চা বানাও"', text: 'এখানে "২ কাপ" কী?', options: ["ফাংশন", "রিটার্ন ভ্যালু", "প্যারামিটার", "লুপ"], correct: 2 },
    { story: '"৩টা ডিম, ২ কাপ দুধ, ১ কাপ চিনি"', text: "কয়টি প্যারামিটার?", options: ["১টি", "২টি", "৩টি", "৪টি"], correct: 2 },
    { story: "যোগ মেশিনে ৫+৩=৮", text: "এখানে ৮ কী?", options: ["প্যারামিটার", "রিটার্ন ভ্যালু", "ফাংশন", "লুপ"], correct: 1 },
    { story: "কেক মেশিন কেক রিটার্ন করল।", text: "কেক কী?", options: ["প্যারামিটার", "ফাংশন", "রিটার্ন ভ্যালু", "ইনপুট"], correct: 2 },
    { story: "Multiply(৪,৫) → ২০", text: "এখানে ৪ ও ৫ কী এবং ২০ কী?", options: ["৪,৫=Return, ২০=Parameter", "৪,৫=Parameter, ২০=Return", "৪,৫=Function, ২০=Loop", "৪,৫=Loop, ২০=Function"], correct: 1 }
  ];
  
  const allLevelQuestions = {
    1: level1Questions, 2: level2Questions, 3: level3Questions,
    4: level4Questions, 5: level5Questions, 6: level6Questions
  };
  
  let currentQuestions = [];
  
  function renderQuestions() {
    const container = document.getElementById('questionsContainer');
    container.innerHTML = '';
    userAnswers = {};
    
    currentQuestions.forEach((q, idx) => {
      const qDiv = document.createElement('div');
      qDiv.className = 'question-card';
      qDiv.id = `q-${idx}`;
      
      let storyHtml = q.story ? `<div class="story-box"><i class="fa-solid fa-comment-dots me-1"></i> ${q.story}</div>` : '';
      let matrixHtml = '';
      if (q.matrix && q.getMatrixHTML) {
        matrixHtml = q.getMatrixHTML();
      }
      
      qDiv.innerHTML = `
        ${storyHtml}
        ${matrixHtml}
        <div class="question-text">📝 প্রশ্ন ${idx+1}: ${q.text}</div>
        <div class="options" id="options-${idx}"></div>
      `;
      container.appendChild(qDiv);
      
      const optsDiv = document.getElementById(`options-${idx}`);
      q.options.forEach((opt, optIdx) => {
        const optBtn = document.createElement('div');
        optBtn.className = 'option-btn';
        optBtn.textContent = opt;
        optBtn.onclick = () => selectAnswer(idx, optIdx, optBtn);
        optsDiv.appendChild(optBtn);
      });
    });
    
    document.getElementById('totalQuestions').innerText = currentQuestions.length;
    document.getElementById('scoreDisplay').innerText = '0';
  }
  
  function selectAnswer(qIdx, optIdx, btnElement) {
    if (quizSubmitted) return;
    const optsDiv = document.getElementById(`options-${qIdx}`);
    const btns = optsDiv.querySelectorAll('.option-btn');
    btns.forEach(btn => btn.classList.remove('selected-correct'));
    btnElement.classList.add('selected-correct');
    userAnswers[qIdx] = optIdx;
    updateProgress();
  }
  
  function updateProgress() {
    const answered = Object.keys(userAnswers).length;
    document.getElementById('scoreDisplay').innerText = answered;
  }
  
  function calculateScore() {
    let score = 0;
    for (let i = 0; i < currentQuestions.length; i++) {
      if (userAnswers[i] !== undefined && userAnswers[i] === currentQuestions[i].correct) {
        score++;
      }
    }
    return score;
  }
  
  async function submitQuiz() {
    if (quizSubmitted) {
      alert('আপনি ইতিমধ্যে এই লেভেলের কুইজ জমা দিয়েছেন!');
      return;
    }
    
    const answeredCount = Object.keys(userAnswers).length;
    if (answeredCount < currentQuestions.length) {
      alert(`আপনি ${answeredCount} টি প্রশ্নের উত্তর দিয়েছেন। সব ${currentQuestions.length} টি প্রশ্নের উত্তর দিন!`);
      return;
    }
    
    const score = calculateScore();
    
    if (currentUser) {
      try {
        const levelKey = `level${currentLevel}Score`;
        const userDocRef = db.collection('all_results').doc(currentUser);
        await userDocRef.set({
          [levelKey]: score,
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        console.log(`Level ${currentLevel} score saved: ${score}`);
        alert(`আপনি ${score} / ${currentQuestions.length} সঠিক উত্তর দিয়েছেন!`);
      } catch (e) {
        console.error("Firebase error:", e);
        alert(`আপনি ${score} / ${currentQuestions.length} সঠিক উত্তর দিয়েছেন! (ডাটা সংরক্ষণ হয়নি)`);
      }
    } else {
      alert(`আপনি ${score} / ${currentQuestions.length} সঠিক উত্তর দিয়েছেন!`);
    }
    
    quizSubmitted = true;
    createConfetti();
  }
  
  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timeSeconds = 300;
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      if (timeSeconds <= 0) {
        clearInterval(timerInterval);
        alert('সময় শেষ! এখন জমা দিতে হবে।');
        submitQuiz();
      } else {
        timeSeconds--;
        updateTimerDisplay();
      }
    }, 1000);
  }
  
  function updateTimerDisplay() {
    const mins = Math.floor(timeSeconds / 60);
    const secs = timeSeconds % 60;
    document.getElementById('timerDisplay').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
  }
  
  function createConfetti() {
    for (let i = 0; i < 60; i++) {
      const confetti = document.createElement('div');
      confetti.style.position = 'fixed';
      confetti.style.width = '8px';
      confetti.style.height = '8px';
      confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 60%)`;
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.top = '-10px';
      confetti.style.pointerEvents = 'none';
      confetti.style.zIndex = '2000';
      confetti.style.animation = `confettiFall ${0.8 + Math.random() * 1}s ease-out forwards`;
      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 2000);
    }
  }
  
  function loadLevel(level) {
    currentLevel = level;
    currentQuestions = [...allLevelQuestions[level]];
    userAnswers = {};
    quizSubmitted = false;
    document.getElementById('levelTitle').innerHTML = getLevelIcon(level);
    document.getElementById('scoreDisplay').innerText = '0';
    renderQuestions();
    startTimer();
    
    document.querySelectorAll('.level-btn').forEach(btn => {
      btn.classList.remove('active');
      if (parseInt(btn.dataset.level) === level) btn.classList.add('active');
    });
  }
  
  function getLevelIcon(level) {
    const icons = { 1: "🧩 লেভেল ১ কুইজ", 2: "🧮 লেভেল ২ কুইজ", 3: "🌲 লেভেল ৩ কুইজ", 4: "⛰️ লেভেল ৪ কুইজ", 5: "🌀 লেভেল ৫ কুইজ", 6: "🏰 লেভেল ৬ কুইজ" };
    return icons[level];
  }
  
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      currentUser = user.uid;
      console.log("Logged in as:", currentUser);
      loadLevel(1);
    } else {
      try {
        const userCredential = await auth.signInAnonymously();
        currentUser = userCredential.user.uid;
        loadLevel(1);
      } catch(e) { console.error("Auth error:", e); loadLevel(1); }
    }
  });
  
  document.querySelectorAll('.level-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!quizSubmitted || confirm('কুইজ জমা না দিয়ে লেভেল বদলালে অগ্রগতি হারাবে। নিশ্চিত?')) {
        loadLevel(parseInt(btn.dataset.level));
      }
    });
  });
  
  document.getElementById('submitBtn').addEventListener('click', submitQuiz);
  
  const style = document.createElement('style');
  style.textContent = `@keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(360deg); opacity: 0; } }`;
  document.head.appendChild(style);
</script>
</body>
</html>
